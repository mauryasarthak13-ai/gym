<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option</title>
    <style>
    body{
        margin: 0px;
        padding: 0px;
        font-family: Arial, sans-serif;
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        background: url(back.png);
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .h{
        text-align: center;
        color: white;
        font-size: 32px;
        margin-bottom: 40px;
        text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }

    .gain, .loss{
        text-align: center;
        padding: 15px 30px;
        color: white;
        background: rgba(0, 0, 0, 0.7);
        border: none;
        border-radius: 30px;
        width: 220px;
        margin: 15px auto;
        transition: all 0.3s ease;
        box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .gain button, .loss button{
        background: none;
        border: none;
        color: white;
        font-size: 18px;
        cursor: pointer;
        width: 100%;
    }

    .gain:hover, .loss:hover{
        background: white;
        transform: scale(1.08);
    }

    .gain:hover button, .loss:hover button{
        color: black;
    }
</style>
</head>
<body>
  <h2 class="h ">What you want? <br></h2>  
<form action="gain.html" class="gain">
    <button>Weight Gain</button>
</form>
<form action="loss.html" class="loss">
    <button>Weight Loss</button>
</form>
</body>
</html>
