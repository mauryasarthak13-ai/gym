<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>

<style>
    body {
        font-family: Arial;
        background: linear-gradient(to right, #11998e, #38ef7d);
        text-align: center;
        color: white;
        padding: 40px;
    }

    .box {
        background: rgba(0,0,0,0.4);
        padding: 25px;
        border-radius: 15px;
        width: 350px;
        margin: auto;
    }

    input, textarea, button {
        width: 90%;
        padding: 10px;
        margin: 10px;
        border-radius: 10px;
        border: none;
    }

    button {
        background: #ff9800;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background: #e68900;
    }
</style>
</head>

<body>

<h1>Contact Us 📩</h1>
<div class="box">
    <form action="https://formsubmit.co/mauryasarthak13@gmail.com" method="POST">
        
        <input type="text" name="name" placeholder="Your Name" required>
        
        <input type="email" name="email" placeholder="Your Email" required>
        
        <textarea name="message" rows="5" placeholder="Write your suggestion or task details..." required></textarea>

        <!-- Optional hidden settings -->
        <input type="hidden" name="_subject" value="New Message from Website">
        <input type="hidden" name="_captcha" value="false">

        <!-- ✅ Redirect after submit -->
        <input type="hidden" name="_next" value="index.html">

        <button type="submit">Send Message</button>
    </form>
</div>
</body>
</html>
