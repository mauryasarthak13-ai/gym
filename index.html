<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarthak' Gym</title>
    <style>
        /* ===== RESET ===== */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: 'Segoe UI', sans-serif;
    color: white;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url(background.png);
    background-size: cover;
    background-position: center;
    min-height: 100vh;
}

/* ===== HEADER ===== */
.head{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
}

/* LOGO */
.left{
    text-align: center;
}
.left img{
    width: 70px;
    filter: invert(100%);
}
.left div{
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* NAVBAR */
.mid{
    flex: 1;
    display: flex;
    justify-content: center;
}
.navbar{
    display: flex;
    gap: 35px;
}
.navbar li{
    list-style: none;
}
.navbar li a{
    text-decoration: none;
    color: white;
    font-size: 18px;
    position: relative;
}

/* underline animation */
.navbar li a::after{
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #00ffcc;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}
.navbar li a:hover::after{
    width: 100%;
}

/* BUTTONS */
.right{
    display: flex;
}
.btn{
    margin-left: 10px;
    padding: 8px 16px;
    border: none;
    background: #00ffcc;
    color: black;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}
.btn:hover{
    background: white;
}

/* ===== MAIN CONTAINER ===== */
.container{
    width: 400px;
    margin: 100px auto;
    padding: 35px;
    border-radius: 15px;
    text-align: center;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

.container h1{
    margin-bottom: 20px;
    font-size: 24px;
}

/* FORM */
.form-group input{
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    outline: none;
}

/* BUTTON */
.container button{
    width: 100%;
    margin-top: 15px;
}

/* ===== MOBILE DESIGN ===== */
@media (max-width: 768px){

    .head{
        flex-direction: column;
        padding: 15px;
    }

    .mid{
        margin: 15px 0;
    }

    .navbar{
        flex-direction: column;
        gap: 10px;
        align-items: center;
    }

    .navbar li a{
        font-size: 16px;
    }

    .right{
        flex-direction: column;
        width: 100%;
        align-items: center;
    }

    .btn{
        width: 90%;
        margin: 5px 0;
    }

    .container{
        width: 90%;
        margin: 40px auto;
        padding: 25px;
    }

    .container h1{
        font-size: 20px;
    }
}

/* SMALL PHONES */
@media (max-width: 480px){
    .left img{
        width: 60px;
    }
    .left div{
        font-size: 16px;
    }
}
    </style>
</head>
<body>
    <header class="head">
        <!-- Left box for logo -->
    <div class="left">
    <img src="gym.png" alt="Logo">
    <div>Sarthak Fitness</div>
    </div>
    <!-- Mid box for nav -->
    <div class="mid">
     <ul class="navbar">
        <li><a href="https://youtube.com" target="_blank" >Home</a></li>
        <li><a href="about.html" target="_blank" >About us</a></li>
        <li><a href="fitness.html" target="_blank" >Fitness calculator</a></li>
        <li><a href="email.html" target="_blank" >Contact us</a></li>
    </ul>
    </div>
    <!-- Right box buttons  -->
    <div class="right">
    <button class="btn"><a href="email.html" target="_blank"  class="sar">Call us now </a></button>
    <button class="btn"><a href="email.html" target="_blank"  class="sar">Email us</a></button>
    </div>
    </header>
    <div class="container">
        <h1>Join the best gym of U.P now</h1>
        <form action="submit.html">
            <div class="form-group">
                <input type="text" name="" placeholder="Enter your Name...">
            </div>
             <div class="form-group">
                <input type="text" name="" placeholder="Enter your Age...">
            </div>
             <div class="form-group">
                <input type="text" name="" placeholder="Enter your Gender...">
            </div>
             <div class="form-group">
                <input type="text" name="" placeholder="Enter your Weight...">
            </div>
            <button class="btn">Submit</button>
        </form>
    </div>
    
</body>
</html>
