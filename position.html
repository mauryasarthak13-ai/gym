<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position</title>
    <style>
        .container{
            border:2px solid black;
            background-color: khaki;
            height: 3444px;
        }
       /* CSS Positions: static,ablosute,relative,fixed,sticky */
    .box{
        display: inline-block;
        border: 2px solid red;
        width: 150px;
        height: 150px;
        margin: 2px;
       }
       #box3{
       /* relative: means the element is positioned relative to its normal position. */
       /* position: relative; */

        /* absolute: means the element is positioned relative  to its nearest positioned ancestor (instead of positioned relative to the viewport, like fixed).  */
       /* position: absolute; */

       /* fixed: means the element is positioned relative to the viewport, which means it always stays in the same place even if the page is scrolled. */
       /* position: fixed; */

       /* sticky:means the element is based on the user's scroll position. A sticky element toggles between relative and fixed, depending on the scroll position. It is positioned relative until a given offset position is met in the viewport - then it "sticks" in place (like position:fixed).  */

   /* some position are like this - right: 4px;  bottom: 2px;  top: 34px; left: 134px; */

       position: sticky;
       top: 3px;
       }
    </style>
</head>
<body>
    <div class="container">
    <div class="box" id="box1">1</div>
    <div class="box" id="box2">2</div>
    <div class="box" id="box3">Chat with us</div>
    <div class="box" id="box4">4</div>
    </div>
</body>
</html>
